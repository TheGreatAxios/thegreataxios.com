<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Confidential Poker full stack architecture with 6 AI agents">
  <title>Confidential Poker: Full Stack Architecture</title>
  <desc>Four-layer architecture showing Frontend, Server, Smart Contracts, and Programmable Privacy with 6 distinct AI agent personalities</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
    .bg { fill: #fafafa; }
    .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
    .label { font-size: 10px; fill: #495057; }
    .small { font-size: 9px; fill: #6c757d; }
    .layer-fe { fill: #e3f8ff; stroke: #61dafb; stroke-width: 2; }
    .layer-srv { fill: #fffde7; stroke: #f7df1e; stroke-width: 2; }
    .layer-sc { fill: #eceff1; stroke: #3c3c3d; stroke-width: 2; }
    .layer-priv { fill: #f0fdf9; stroke: #2a9d8f; stroke-width: 2; }
    .agent { stroke-width: 1.5; }
    .agent-sharky { fill: #ffebee; stroke: #e63946; }
    .agent-sly { fill: #fff3e0; stroke: #fd7e14; }
    .agent-prof { fill: #f3e5f5; stroke: #9c27b0; }
    .agent-thunder { fill: #ffebee; stroke: #d32f2f; }
    .agent-whiskers { fill: #e8f5e9; stroke: #4caf50; }
    .agent-alpha { fill: #e3f2fd; stroke: #2196f3; }
    .card-red { fill: #fff; stroke: #e63946; stroke-width: 1.5; }
    .card-black { fill: #fff; stroke: #1a1a1a; stroke-width: 1.5; }
    .data-flow { stroke-width: 2; stroke-dasharray: 4,2; }
    .encrypt-node { fill: #e3f2fd; stroke: #457b9d; stroke-width: 1.5; }
  </style>
  
  <rect width="900" height="500" class="bg"/>
  
  <!-- Title -->
  <text x="450" y="25" class="title text" text-anchor="middle">Confidential Poker: Full Stack Architecture</text>
  <text x="450" y="42" class="small text" text-anchor="middle">Live demo: confidential-poker.vercel.app</text>
  
  <!-- LAYER 1: Frontend -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="500" height="70" rx="8" class="layer-fe"/>
    <text x="20" y="22" class="label text" font-weight="600" fill="#0277bd">1. Frontend</text>
    <text x="20" y="38" class="small text">Vite + React 19 • 16 Components</text>
    <text x="20" y="55" class="small text">WebSocket • Real-time Game State</text>
    
    <!-- Browser icon -->
    <rect x="420" y="15" width="60" height="40" rx="4" fill="white" stroke="#61dafb" stroke-width="1.5"/>
    <rect x="425" y="20" width="50" height="3" fill="#61dafb" opacity="0.3"/>
    <circle cx="430" cy="21" r="1.5" fill="#e63946"/>
    <circle cx="436" cy="21" r="1.5" fill="#fd7e14"/>
    <circle cx="442" cy="21" r="1.5" fill="#28a745"/>
    <text x="450" y="45" font-size="14" text-anchor="middle">🖥️</text>
  </g>
  
  <!-- Arrow down -->
  <g transform="translate(300, 130)">
    <path d="M0 0 L0 20" stroke="#495057" stroke-width="2" marker-end="url(#arrow-down)"/>
    <circle cx="0" cy="8" r="3" fill="#61dafb">
      <animate attributeName="cy" values="0;20" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- LAYER 2: Server + AI Agents -->
  <g transform="translate(50, 155)">
    <rect x="0" y="0" width="500" height="85" rx="8" class="layer-srv"/>
    <text x="20" y="20" class="label text" font-weight="600" fill="#f57f17">2. Server</text>
    <text x="20" y="36" class="small text">Hono + TypeScript • REST API • Game Orchestrator</text>
    <text x="20" y="52" class="small text">AI Decision Engine • Blockchain Integration</text>
    
    <!-- 6 AI Agents -->
    <g transform="translate(300, 10)">
      <!-- Agent labels -->
      <text x="100" y="0" class="small text" text-anchor="middle" font-weight="600">6 AI Agents</text>
      
      <!-- Sharky (TAG) -->
      <g transform="translate(0, 15)">
        <circle cx="15" cy="15" r="14" class="agent agent-sharky">
          <animate attributeName="r" values="14;15;14" dur="3s" repeatCount="indefinite"/>
        </circle>
        <text x="15" y="20" font-size="12" text-anchor="middle">🦈</text>
        <text x="15" y="40" class="small text" text-anchor="middle" font-size="8">Sharky</text>
        <text x="15" y="50" class="small text" text-anchor="middle" font-size="7" fill="#e63946">TAG</text>
      </g>
      
      <!-- Sly (LAG) -->
      <g transform="translate(45, 15)">
        <circle cx="15" cy="15" r="14" class="agent agent-sly">
          <animate attributeName="r" values="14;15;14" dur="3s" begin="0.5s" repeatCount="indefinite"/>
        </circle>
        <text x="15" y="20" font-size="12" text-anchor="middle">🦊</text>
        <text x="15" y="40" class="small text" text-anchor="middle" font-size="8">Sly</text>
        <text x="15" y="50" class="small text" text-anchor="middle" font-size="7" fill="#fd7e14">LAG</text>
      </g>
      
      <!-- Professor -->
      <g transform="translate(90, 15)">
        <circle cx="15" cy="15" r="14" class="agent agent-prof">
          <animate attributeName="r" values="14;15;14" dur="3s" begin="1s" repeatCount="indefinite"/>
        </circle>
        <text x="15" y="20" font-size="12" text-anchor="middle">🦉</text>
        <text x="15" y="40" class="small text" text-anchor="middle" font-size="8">Prof</text>
        <text x="15" y="50" class="small text" text-anchor="middle" font-size="7" fill="#9c27b0">Tight</text>
      </g>
      
      <!-- Thunder -->
      <g transform="translate(135, 15)">
        <circle cx="15" cy="15" r="14" class="agent agent-thunder">
          <animate attributeName="r" values="14;15;14" dur="3s" begin="1.5s" repeatCount="indefinite"/>
        </circle>
        <text x="15" y="20" font-size="12" text-anchor="middle">🐂</text>
        <text x="15" y="40" class="small text" text-anchor="middle" font-size="8">Thunder</text>
        <text x="15" y="50" class="small text" text-anchor="middle" font-size="7" fill="#d32f2f">Maniac</text>
      </g>
      
      <!-- Whiskers (GTO) -->
      <g transform="translate(180, 15)">
        <circle cx="15" cy="15" r="14" class="agent agent-whiskers">
          <animate attributeName="r" values="14;15;14" dur="3s" begin="2s" repeatCount="indefinite"/>
        </circle>
        <text x="15" y="20" font-size="12" text-anchor="middle">🐱</text>
        <text x="15" y="40" class="small text" text-anchor="middle" font-size="8">Whiskers</text>
        <text x="15" y="50" class="small text" text-anchor="middle" font-size="7" fill="#4caf50">GTO</text>
      </g>
      
      <!-- Alpha (Adaptive) -->
      <g transform="translate(225, 15)">
        <circle cx="15" cy="15" r="14" class="agent agent-alpha">
          <animate attributeName="r" values="14;15;14" dur="3s" begin="2.5s" repeatCount="indefinite"/>
        </circle>
        <text x="15" y="20" font-size="12" text-anchor="middle">🐺</text>
        <text x="15" y="40" class="small text" text-anchor="middle" font-size="8">Alpha</text>
        <text x="15" y="50" class="small text" text-anchor="middle" font-size="7" fill="#2196f3">Adaptive</text>
      </g>
    </g>
  </g>
  
  <!-- Arrow down -->
  <g transform="translate(300, 240)">
    <path d="M0 0 L0 20" stroke="#495057" stroke-width="2" marker-end="url(#arrow-down)"/>
    <circle cx="0" cy="8" r="3" fill="#f7df1e">
      <animate attributeName="cy" values="0;20" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- LAYER 3: Smart Contracts -->
  <g transform="translate(50, 265)">
    <rect x="0" y="0" width="500" height="70" rx="8" class="layer-sc"/>
    <text x="20" y="20" class="label text" font-weight="600" fill="#37474f">3. Smart Contracts</text>
    <text x="20" y="38" class="small text">Foundry • PokerGame.sol • HandEvaluator.sol • MockSKL.sol</text>
    
    <!-- Contract icons -->
    <g transform="translate(350, 15)">
      <rect x="0" y="0" width="40" height="40" rx="4" fill="white" stroke="#3c3c3d" stroke-width="1.5"/>
      <text x="20" y="25" font-size="16" text-anchor="middle">📜</text>
      <text x="20" y="50" class="small text" text-anchor="middle" font-size="7">Game</text>
    </g>
    <g transform="translate(400, 15)">
      <rect x="0" y="0" width="40" height="40" rx="4" fill="white" stroke="#3c3c3d" stroke-width="1.5"/>
      <text x="20" y="25" font-size="16" text-anchor="middle">🃏</text>
      <text x="20" y="50" class="small text" text-anchor="middle" font-size="7">Evaluator</text>
    </g>
    <g transform="translate(450, 15)">
      <rect x="0" y="0" width="40" height="40" rx="4" fill="white" stroke="#3c3c3d" stroke-width="1.5"/>
      <text x="20" y="25" font-size="16" text-anchor="middle">🪙</text>
      <text x="20" y="50" class="small text" text-anchor="middle" font-size="7">Token</text>
    </g>
  </g>
  
  <!-- Arrow down -->
  <g transform="translate(300, 335)">
    <path d="M0 0 L0 20" stroke="#495057" stroke-width="2" marker-end="url(#arrow-down)"/>
    <circle cx="0" cy="8" r="3" fill="#3c3c3d">
      <animate attributeName="cy" values="0;20" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- LAYER 4: Programmable Privacy -->
  <g transform="translate(50, 360)">
    <rect x="0" y="0" width="500" height="90" rx="8" class="layer-priv"/>
    <text x="20" y="20" class="label text" font-weight="600" fill="#1b5e20">4. Programmable Privacy</text>
    <text x="20" y="38" class="small text">Dual Encryption (TE + ECIES) • CTX Callbacks • Threshold Decryption</text>
    
    <!-- Encryption visualization -->
    <g transform="translate(200, 50)">
      <!-- Original card -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="30" height="42" rx="3" class="card-red"/>
        <text x="15" y="25" font-size="14" text-anchor="middle" fill="#e63946">♥</text>
        <text x="6" y="12" font-size="8" fill="#e63946">A</text>
      </g>
      
      <!-- Arrow to dual encryption -->
      <text x="45" y="25" font-size="12">→</text>
      
      <!-- Dual encryption -->
      <g transform="translate(70, 0)">
        <circle cx="15" cy="21" r="18" class="encrypt-node">
          <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="15" y="17" font-size="8" text-anchor="middle" fill="#1565c0">Dual</text>
        <text x="15" y="28" font-size="8" text-anchor="middle" fill="#1565c0">Encrypt</text>
        <text x="35" y="25" font-size="10" fill="#6c757d">🔒</text>
      </g>
      
      <!-- Two outputs -->
      <g transform="translate(130, 0)">
        <!-- TE output -->
        <rect x="0" y="0" width="25" height="35" rx="3" fill="#6c757d"/>
        <text x="12" y="20" font-size="7" text-anchor="middle" fill="white" font-family="monospace">TE</text>
        <text x="12" y="45" class="small text" text-anchor="middle" font-size="7">Showdown</text>
        
        <!-- ECIES output -->
        <rect x="35" y="0" width="25" height="35" rx="3" fill="#28a745"/>
        <text x="47" y="20" font-size="7" text-anchor="middle" fill="white" font-family="monospace">EC</text>
        <text x="47" y="45" class="small text" text-anchor="middle" font-size="7">Player</text>
      </g>
    </g>
    
    <!-- CTX flow -->
    <text x="350" y="60" class="small text" font-size="8">Block N: submitCTX()</text>
    <text x="350" y="75" class="small text" font-size="8">Block N+1: onDecrypt()</text>
    <circle cx="420" cy="55" r="10" fill="#fd7e14" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Right side: Data flow summary -->
  <g transform="translate(580, 60)">
    <rect x="0" y="0" width="270" height="390" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="135" y="25" class="title text" text-anchor="middle">Data Flow</text>
    
    <!-- Flow items -->
    <g transform="translate(20, 45)">
      <circle cx="10" cy="10" r="6" fill="#61dafb"/>
      <text x="25" y="14" class="small text">Player actions → Server</text>
    </g>
    
    <g transform="translate(20, 70)">
      <circle cx="10" cy="10" r="6" fill="#f7df1e"/>
      <text x="25" y="14" class="small text">AI agents decide → Server</text>
    </g>
    
    <g transform="translate(20, 95)">
      <circle cx="10" cy="10" r="6" fill="#3c3c3d"/>
      <text x="25" y="14" class="small text">Game state → Contracts</text>
    </g>
    
    <g transform="translate(20, 120)">
      <circle cx="10" cy="10" r="6" fill="#2a9d8f"/>
      <text x="25" y="14" class="small text">Cards encrypt → TE + ECIES</text>
    </g>
    
    <g transform="translate(20, 145)">
      <circle cx="10" cy="10" r="6" fill="#fd7e14"/>
      <text x="25" y="14" class="small text">Community cards → CTX</text>
    </g>
    
    <!-- Card dealing animation -->
    <g transform="translate(20, 180)">
      <text x="115" y="0" class="label text" text-anchor="middle">Hole Cards Dealing</text>
      
      <!-- Card 1 -->
      <g transform="translate(30, 15)">
        <rect x="0" y="0" width="25" height="35" rx="3" class="card-red">
          <animate attributeName="opacity" values="0;1" dur="1s" repeatCount="indefinite"/>
        </rect>
        <text x="12" y="22" font-size="10" text-anchor="middle" fill="#e63946">♥</text>
      </g>
      
      <!-- Card 2 -->
      <g transform="translate(70, 15)">
        <rect x="0" y="0" width="25" height="35" rx="3" class="card-black">
          <animate attributeName="opacity" values="0;1" dur="1s" begin="0.3s" repeatCount="indefinite"/>
        </rect>
        <text x="12" y="22" font-size="10" text-anchor="middle" fill="#1a1a1a">♠</text>
      </g>
      
      <!-- Card 3 -->
      <g transform="translate(110, 15)">
        <rect x="0" y="0" width="25" height="35" rx="3" class="card-red">
          <animate attributeName="opacity" values="0;1" dur="1s" begin="0.6s" repeatCount="indefinite"/>
        </rect>
        <text x="12" y="22" font-size="10" text-anchor="middle" fill="#e63946">♦</text>
      </g>
      
      <!-- Encrypted indicator -->
      <text x="115" y="70" class="small text" text-anchor="middle" fill="#2a9d8f">Encrypted at deal time</text>
    </g>
    
    <!-- Stack badge -->
    <g transform="translate(20, 285)">
      <text x="115" y="0" class="label text" text-anchor="middle">Tech Stack</text>
      
      <rect x="10" y="10" width="50" height="20" rx="3" fill="#61dafb" opacity="0.3"/>
      <text x="35" y="24" class="small text" text-anchor="middle" font-size="8">Vite</text>
      
      <rect x="70" y="10" width="50" height="20" rx="3" fill="#61dafb" opacity="0.3"/>
      <text x="95" y="24" class="small text" text-anchor="middle" font-size="8">React 19</text>
      
      <rect x="130" y="10" width="50" height="20" rx="3" fill="#f7df1e" opacity="0.3"/>
      <text x="155" y="24" class="small text" text-anchor="middle" font-size="8">Hono</text>
      
      <rect x="10" y="40" width="50" height="20" rx="3" fill="#3c3c3d" opacity="0.3"/>
      <text x="35" y="54" class="small text" text-anchor="middle" font-size="8">Foundry</text>
      
      <rect x="70" y="40" width="110" height="20" rx="3" fill="#2a9d8f" opacity="0.3"/>
      <text x="125" y="54" class="small text" text-anchor="middle" font-size="8">Programmable Privacy</text>
      
      <rect x="10" y="70" width="170" height="20" rx="3" fill="#fd7e14" opacity="0.3"/>
      <text x="95" y="84" class="small text" text-anchor="middle" font-size="8">SKALE Hackathon April 2026</text>
    </g>
  </g>
  
  <!-- Bottom caption -->
  <text x="450" y="480" class="small text" text-anchor="middle" fill="#6c757d">
    Fair onchain gaming with threshold encryption — no trusted intermediaries
  </text>
  
  <defs>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 5 7, 10 0" fill="#495057"/>
    </marker>
  </defs>
</svg>
