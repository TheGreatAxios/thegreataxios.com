<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Visible versus encrypted transaction flow comparison">
  <title>Transaction Flow: Visible vs Encrypted</title>
  <desc>A split-screen comparison showing standard transactions vulnerable to MEV attacks versus encrypted transactions protected by threshold cryptography</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
    .bg { fill: #fafafa; }
    .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
    .label { font-size: 11px; fill: #6c757d; }
    .badge-text { font-size: 10px; font-weight: 600; fill: white; text-anchor: middle; }
    .path-plain { stroke: #e63946; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .path-encrypted { stroke: #2a9d8f; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .node-plain { fill: #fff5f5; stroke: #e63946; stroke-width: 2; }
    .node-encrypted { fill: #f0fdf9; stroke: #2a9d8f; stroke-width: 2; }
    .node-lock { fill: #e3f2fd; stroke: #457b9d; stroke-width: 2; }
    .flow-dot { r: 4; }
    .bot { fill: #e63946; opacity: 0.8; }
    .shield { fill: #2a9d8f; opacity: 0.9; }
    .badge-vulnerable { fill: #e63946; }
    .badge-protected { fill: #2a9d8f; }
    .cipher { font-family: monospace; font-size: 9px; fill: #6c757d; }
  </style>
  
  <rect width="800" height="400" class="bg"/>
  
  <!-- Divider -->
  <line x1="400" y1="40" x2="400" y2="360" stroke="#dee2e6" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- LEFT SIDE: Visible/Plaintext -->
  <text x="200" y="35" class="title text" text-anchor="middle">Standard Transaction</text>
  
  <!-- Badge: VISIBLE -->
  <rect x="140" y="50" width="120" height="22" rx="11" class="badge-vulnerable"/>
  <text x="200" y="65" class="badge-text text">VULNERABLE TO MEV</text>
  
  <!-- Nodes -->
  <g>
    <!-- Wallet -->
    <rect x="170" y="100" width="60" height="40" rx="6" class="node-plain"/>
    <text x="200" y="125" class="label text" text-anchor="middle">Wallet</text>
    
    <!-- Mempool (vulnerable) -->
    <rect x="170" y="180" width="60" height="40" rx="6" class="node-plain"/>
    <text x="200" y="200" class="label text" text-anchor="middle">Mempool</text>
    <text x="200" y="212" class="label text" text-anchor="middle" font-size="9">(visible)</text>
    
    <!-- Validator -->
    <rect x="170" y="260" width="60" height="40" rx="6" class="node-plain"/>
    <text x="200" y="280" class="label text" text-anchor="middle">Validator</text>
    <text x="200" y="292" class="label text" text-anchor="middle" font-size="9">(visible)</text>
    
    <!-- Block -->
    <rect x="170" y="340" width="60" height="40" rx="6" class="node-plain"/>
    <text x="200" y="365" class="label text" text-anchor="middle">Block</text>
  </g>
  
  <!-- Flow lines -->
  <path d="M200 140 L200 180" class="path-plain"/>
  <path d="M200 220 L200 260" class="path-plain"/>
  <path d="M200 300 L200 340" class="path-plain"/>
  
  <!-- MEV Bots attacking mempool -->
  <g>
    <!-- Bot 1 -->
    <circle cx="130" cy="200" r="14" class="bot">
      <animate attributeName="opacity" values="0;0.8;0;0.8;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="130" y="205" font-size="12" fill="white" text-anchor="middle">🤖</text>
    
    <!-- Bot 2 -->
    <circle cx="270" cy="190" r="14" class="bot">
      <animate attributeName="opacity" values="0;0;0.8;0;0.8;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="270" y="195" font-size="12" fill="white" text-anchor="middle">🤖</text>
    
    <!-- Bot 3 -->
    <circle cx="270" cy="210" r="14" class="bot">
      <animate attributeName="opacity" values="0;0.8;0;0;0.8;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="270" y="215" font-size="12" fill="white" text-anchor="middle">🤖</text>
  </g>
  
  <!-- Sandwich attack visualization -->
  <g>
    <text x="130" y="175" class="label text" font-size="9" fill="#e63946">Front-run</text>
    <text x="270" y="175" class="label text" font-size="9" fill="#e63946">Back-run</text>
    <path d="M140 185 L165 195" stroke="#e63946" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M260 185 L235 195" stroke="#e63946" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6">
      <animate attributeName="opacity" values="0;0;0.6;0" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Flow dots - left side -->
  <circle cx="200" cy="160" r="4" fill="#e63946">
    <animate attributeName="cy" values="140;180" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="240" r="4" fill="#e63946">
    <animate attributeName="cy" values="220;260" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="320" r="4" fill="#e63946">
    <animate attributeName="cy" values="300;340" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- RIGHT SIDE: Encrypted -->
  <text x="600" y="35" class="title text" text-anchor="middle">Encrypted Transaction</text>
  
  <!-- Badge: PROTECTED -->
  <rect x="540" y="50" width="120" height="22" rx="11" class="badge-protected"/>
  <text x="600" y="65" class="badge-text text">PROTECTED</text>
  
  <!-- Nodes -->
  <g>
    <!-- Wallet -->
    <rect x="570" y="90" width="60" height="35" rx="6" class="node-encrypted"/>
    <text x="600" y="112" class="label text" text-anchor="middle">Wallet</text>
    
    <!-- Encrypt node -->
    <circle cx="600" cy="155" r="18" class="node-lock"/>
    <text x="600" y="160" font-size="14" text-anchor="middle">🔒</text>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    
    <!-- Mempool (encrypted) -->
    <rect x="570" y="195" width="60" height="40" rx="6" class="node-encrypted"/>
    <text x="600" y="215" class="label text" text-anchor="middle">Mempool</text>
    <text x="600" y="227" class="cipher text" text-anchor="middle">0x7a3f...9e2b</text>
    
    <!-- Validator -->
    <rect x="570" y="255" width="60" height="35" rx="6" class="node-encrypted"/>
    <text x="600" y="272" class="label text" text-anchor="middle">Validators</text>
    <text x="600" y="284" class="label text" text-anchor="middle" font-size="9">(consensus)</text>
    
    <!-- Decrypt node -->
    <circle cx="600" cy="315" r="18" class="node-lock"/>
    <text x="600" y="320" font-size="14" text-anchor="middle">🔓</text>
    
    <!-- Block -->
    <rect x="570" y="340" width="60" height="40" rx="6" class="node-encrypted"/>
    <text x="600" y="365" class="label text" text-anchor="middle">Block</text>
  </g>
  
  <!-- Flow lines -->
  <path d="M600 125 L600 137" class="path-encrypted"/>
  <path d="M600 173 L600 195" class="path-encrypted"/>
  <path d="M600 235 L600 255" class="path-encrypted"/>
  <path d="M600 290 L600 297" class="path-encrypted"/>
  <path d="M600 333 L600 340" class="path-encrypted"/>
  
  <!-- Protected shield in mempool -->
  <g>
    <path d="M635 210 Q650 200 665 210 Q665 235 650 245 Q635 235 635 210" fill="none" stroke="#2a9d8f" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <text x="650" y="228" font-size="14" fill="#2a9d8f" opacity="0.8">🛡️</text>
  </g>
  
  <!-- No bots on right side (shield blocking) -->
  <g opacity="0.4">
    <circle cx="530" cy="200" r="12" fill="#6c757d"/>
    <text x="530" y="205" font-size="10" fill="white" text-anchor="middle">🤖</text>
    <line x1="520" y1="190" x2="540" y2="210" stroke="#e63946" stroke-width="2"/>
  </g>
  
  <!-- Flow dots - right side -->
  <circle cx="600" cy="145" r="4" fill="#2a9d8f">
    <animate attributeName="cy" values="125;137" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="210" r="4" fill="#2a9d8f">
    <animate attributeName="cy" values="173;195" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="275" r="4" fill="#2a9d8f">
    <animate attributeName="cy" values="235;255" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="335" r="4" fill="#2a9d8f">
    <animate attributeName="cy" values="315;340" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Lock pulsing animation -->
  <circle cx="600" cy="155" r="22" fill="none" stroke="#457b9d" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="18;28;18" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="315" r="22" fill="none" stroke="#457b9d" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="18;28;18" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Bottom caption -->
  <text x="200" y="390" class="label text" text-anchor="middle" fill="#e63946" font-size="10">$540M+ extracted via MEV attacks</text>
  <text x="600" y="390" class="label text" text-anchor="middle" fill="#2a9d8f" font-size="10">Threshold encryption: zero MEV</text>
</svg>
