<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" role="img" aria-label="Re-encryption transformation flow showing ciphertext transformation through validator committee">
  <title>Re-Encryption: Ciphertext Transformation</title>
  <desc>Encrypted data transforms from one recipient to another through a validator committee without ever decrypting onchain</desc>

  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arr-dark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#adb5bd"/>
    </marker>
    <marker id="arr-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#2a9d8f"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#f1f3f5"/>
    </linearGradient>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .badge-text { font-size: 10px; font-weight: 700; fill: white; text-anchor: middle; }
    .node-label { font-size: 13px; font-weight: 600; fill: #495057; text-anchor: middle; }
    .sub { font-size: 10px; fill: #adb5bd; text-anchor: middle; }
  </style>

  <rect width="1100" height="400" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="550" y="35" font-size="17" font-weight="700" fill="#495057" text-anchor="middle" class="text">Re-Encryption: Transforming Ciphertext</text>
  <text x="550" y="55" class="sub text">Transform from one recipient to another without decrypting onchain</text>

  <!-- ═══ Original Ciphertext (left) ═══ -->
  <g transform="translate(185, 200)">
    <!-- Pulsing aura -->
    <circle r="58" fill="#6c757d" opacity="0">
      <animate attributeName="opacity" values="0;0.12;0" dur="3s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="r" values="55;72;55" dur="3s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </circle>

    <!-- Lock icon above -->
    <g transform="translate(-10, -58) scale(0.8)" stroke="#6c757d" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </g>

    <!-- Ciphertext block -->
    <rect x="-55" y="-40" width="110" height="80" rx="12" fill="#495057" filter="url(#shadow)"/>
    <text x="0" y="-16" fill="#dee2e6" font-size="10" text-anchor="middle" font-family="monospace" class="text">0x7f3a9e...</text>
    <text x="0" y="0" fill="#dee2e6" font-size="10" text-anchor="middle" font-family="monospace" class="text">2b8c4d...</text>
    <text x="0" y="16" fill="#dee2e6" font-size="10" text-anchor="middle" font-family="monospace" class="text">e1f5a0</text>

    <!-- TE badge -->
    <rect x="-18" y="48" width="36" height="20" rx="10" fill="#6c757d"/>
    <text x="0" y="62" class="badge-text text">TE</text>

    <!-- Labels -->
    <text x="0" y="90" class="node-label text">Original</text>
    <text x="0" y="105" class="sub text">Threshold Encrypted</text>
  </g>

  <!-- ═══ Flow Arrow: Original → Committee ═══ -->
  <line x1="260" y1="200" x2="390" y2="200" stroke="#dee2e6" stroke-width="2.5" stroke-dasharray="130" stroke-dashoffset="130" marker-end="url(#arr-dark)">
    <animate attributeName="stroke-dashoffset" values="130;0" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <circle r="6" fill="#adb5bd">
    <animate attributeName="cx" values="260;390" dur="1.5s" calcMode="spline" keySplines="0.4 0 0.6 1" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;200" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ Validator Committee (center) ═══ -->
  <g transform="translate(550, 200)">
    <rect x="-120" y="-95" width="240" height="190" rx="12" fill="white" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="-72" class="node-label text" font-size="12">Validator Committee</text>

    <!-- Connection lines -->
    <line x1="-55" y1="-40" x2="0" y2="0" stroke="#e9ecef" stroke-width="1.5"/>
    <line x1="55" y1="-40" x2="0" y2="0" stroke="#e9ecef" stroke-width="1.5"/>
    <line x1="-55" y1="40" x2="0" y2="0" stroke="#e9ecef" stroke-width="1.5"/>
    <line x1="55" y1="40" x2="0" y2="0" stroke="#e9ecef" stroke-width="1.5"/>

    <!-- Animated pulse lines — teal accent -->
    <line x1="-55" y1="-40" x2="0" y2="0" stroke="#2a9d8f" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </line>
    <line x1="55" y1="-40" x2="0" y2="0" stroke="#2a9d8f" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </line>
    <line x1="-55" y1="40" x2="0" y2="0" stroke="#2a9d8f" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" begin="1s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </line>
    <line x1="55" y1="40" x2="0" y2="0" stroke="#2a9d8f" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" begin="1.5s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </line>

    <!-- Central coordinator — teal accent -->
    <circle r="24" fill="white" stroke="#2a9d8f" stroke-width="2.5" filter="url(#shadow)">
      <animate attributeName="r" values="24;26;24" dur="3s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </circle>
    <!-- RefreshCw icon -->
    <g transform="translate(-9, -9) scale(0.75)" stroke="#2a9d8f" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
      <path d="M8 16H3v5"/>
    </g>

    <!-- Validators — grey base -->
    <circle cx="-55" cy="-40" r="17" fill="white" stroke="#dee2e6" stroke-width="2" filter="url(#shadow)">
      <animate attributeName="stroke" values="#dee2e6;#2a9d8f;#dee2e6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="-55" y="-36" class="badge-text text" fill="#6c757d" font-size="9">V1</text>

    <circle cx="55" cy="-40" r="17" fill="white" stroke="#dee2e6" stroke-width="2" filter="url(#shadow)">
      <animate attributeName="stroke" values="#dee2e6;#2a9d8f;#dee2e6" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <text x="55" y="-36" class="badge-text text" fill="#6c757d" font-size="9">V2</text>

    <circle cx="-55" cy="40" r="17" fill="white" stroke="#dee2e6" stroke-width="2" filter="url(#shadow)">
      <animate attributeName="stroke" values="#dee2e6;#2a9d8f;#dee2e6" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="-55" y="44" class="badge-text text" fill="#6c757d" font-size="9">V3</text>

    <circle cx="55" cy="40" r="17" fill="white" stroke="#dee2e6" stroke-width="2" filter="url(#shadow)">
      <animate attributeName="stroke" values="#dee2e6;#2a9d8f;#dee2e6" dur="2.5s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="55" y="44" class="badge-text text" fill="#6c757d" font-size="9">V4</text>

    <!-- Labels below -->
    <text x="0" y="112" class="node-label text" font-size="11">Threshold Re-encryption</text>
    <text x="0" y="127" class="sub text">No decryption occurs</text>
  </g>

  <!-- ═══ Flow Arrow: Committee → New ═══ -->
  <line x1="700" y1="200" x2="830" y2="200" stroke="#2a9d8f" stroke-width="2.5" stroke-dasharray="130" stroke-dashoffset="130" marker-end="url(#arr-teal)">
    <animate attributeName="stroke-dashoffset" values="130;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </line>
  <circle r="6" fill="#2a9d8f">
    <animate attributeName="cx" values="700;830" dur="1.5s" begin="0.3s" calcMode="spline" keySplines="0.4 0 0.6 1" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;200" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ New Ciphertext (right) — teal accent ═══ -->
  <g transform="translate(915, 200)">
    <!-- Pulsing aura — teal -->
    <circle r="58" fill="#2a9d8f" opacity="0">
      <animate attributeName="opacity" values="0;0.12;0" dur="3s" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="r" values="55;72;55" dur="3s" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </circle>

    <!-- Key icon above -->
    <g transform="translate(-10, -58) scale(0.8)" stroke="#2a9d8f" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
    </g>

    <!-- New ciphertext — grey-to-teal transition -->
    <rect x="-55" y="-40" width="110" height="80" rx="12" filter="url(#shadow)">
      <animate attributeName="fill" values="#495057;#495057;#2a9d8f;#2a9d8f;#495057" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="-16" fill="#dee2e6" font-size="10" text-anchor="middle" font-family="monospace" class="text">0x9e2b...</text>
    <text x="0" y="0" fill="#dee2e6" font-size="10" text-anchor="middle" font-family="monospace" class="text">5f7a...</text>
    <text x="0" y="16" fill="#dee2e6" font-size="10" text-anchor="middle" font-family="monospace" class="text">c3d8e1</text>

    <!-- ECIES badge — teal -->
    <rect x="-25" y="48" width="50" height="20" rx="10" fill="#2a9d8f"/>
    <text x="0" y="62" class="badge-text text">ECIES</text>

    <!-- Labels -->
    <text x="0" y="90" class="node-label text">New Ciphertext</text>
    <text x="0" y="105" class="sub text">Encrypted for New Viewer</text>
  </g>

  <!-- Bottom insight -->
  <text x="550" y="370" font-size="11" fill="#adb5bd" text-anchor="middle" class="text">Plaintext never exposed onchain — only ciphertext transforms</text>
</svg>
