<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" role="img" aria-label="Two-block conditional transaction callback flow">
  <title>CTX Two-Block Pattern</title>
  <desc>Conditional Transactions execute across two blocks: encrypted data submits in block N, batch decryption and callbacks fire in block N+1</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
    .bg { fill: #fafafa; }
    .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
    .label { font-size: 10px; fill: #495057; }
    .small { font-size: 9px; fill: #6c757d; }
    .block-bg { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 2; }
    .block-n { fill: #e3f2fd; stroke: #457b9d; stroke-width: 2; }
    .block-n1 { fill: #f0fdf9; stroke: #28a745; stroke-width: 2; }
    .packet { fill: #6c757d; }
    .packet-encrypted { fill: #6c757d; }
    .packet-decrypted { fill: #28a745; }
    .arrow { stroke: #495057; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .arrow-time { stroke: #fd7e14; stroke-width: 2; stroke-dasharray: 4,2; }
    .callback { fill: #457b9d; }
    .clock { fill: #fd7e14; }
  </style>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057"/>
    </marker>
    <marker id="arrowhead-callback" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#457b9d"/>
    </marker>
  </defs>
  
  <rect width="900" height="350" class="bg"/>
  
  <!-- Block N -->
  <rect x="50" y="60" width="280" height="240" rx="8" class="block-bg"/>
  <rect x="50" y="60" width="280" height="36" rx="8" class="block-n"/>
  <rect x="50" y="88" width="280" height="12" fill="#e3f2fd"/>
  <text x="190" y="84" class="title text" text-anchor="middle" fill="#1a1a1a">Block N</text>
  
  <!-- Block N Content -->
  <g>
    <!-- User submits -->
    <circle cx="100" cy="130" r="20" fill="#fff" stroke="#6c757d" stroke-width="1.5"/>
    <text x="100" y="136" font-size="14" text-anchor="middle">👤</text>
    <text x="100" y="160" class="small text" text-anchor="middle">User/Agent</text>
    
    <!-- Arrow to contract -->
    <path d="M125 130 L165 130" class="arrow" marker-end="url(#arrowhead)"/>
    
    <!-- Contract stores encrypted data -->
    <rect x="175" y="115" width="60" height="30" rx="4" fill="#fff" stroke="#6c757d" stroke-width="1.5"/>
    <text x="205" y="135" class="small text" text-anchor="middle">Contract</text>
    
    <!-- Encrypted data packets stacking -->
    <g>
      <rect x="180" y="165" width="50" height="12" rx="2" class="packet-encrypted" opacity="0.9">
        <animate attributeName="y" values="155;165" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.9;0.9" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <text x="205" y="173" fill="white" font-size="7" text-anchor="middle" font-family="monospace">0x9f...</text>
      
      <rect x="182" y="180" width="50" height="12" rx="2" class="packet-encrypted" opacity="0.7">
        <animate attributeName="y" values="170;180" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.7;0.7" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
      <text x="207" y="188" fill="white" font-size="7" text-anchor="middle" font-family="monospace">0xa2...</text>
      
      <rect x="184" y="195" width="50" height="12" rx="2" class="packet-encrypted" opacity="0.5">
        <animate attributeName="y" values="185;195" dur="1.5s" begin="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.5;0.5" dur="1.5s" begin="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="205" y="220" class="small text" text-anchor="middle" fill="#6c757d">Encrypted data</text>
    <text x="205" y="230" class="small text" text-anchor="middle" fill="#6c757d">stored in contract</text>
    
    <!-- submitCTX arrow -->
    <path d="M235 130 L280 130" class="arrow" marker-end="url(#arrowhead)"/>
    
    <!-- submitCTX call -->
    <rect x="290" y="115" width="70" height="30" rx="4" fill="#fff3e0" stroke="#fd7e14" stroke-width="1.5"/>
    <text x="325" y="128" class="small text" text-anchor="middle" fill="#e65100" font-weight="600">submitCTX()</text>
    <text x="325" y="138" class="small text" text-anchor="middle" fill="#e65100">queued</text>
    
    <!-- Time indicator -->
    <circle cx="325" cy="175" r="18" fill="#fff3e0" stroke="#fd7e14" stroke-width="1.5">
      <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="325" y="180" font-size="12" text-anchor="middle">⏱️</text>
    <text x="325" y="205" class="small text" text-anchor="middle" fill="#fd7e14">~2 sec</text>
    <text x="325" y="215" class="small text" text-anchor="middle" fill="#6c757d">wait</text>
  </g>
  
  <!-- Block N+1 -->
  <rect x="570" y="60" width="280" height="240" rx="8" class="block-bg"/>
  <rect x="570" y="60" width="280" height="36" rx="8" class="block-n1"/>
  <rect x="570" y="88" width="280" height="12" fill="#f0fdf9"/>
  <text x="710" y="84" class="title text" text-anchor="middle" fill="#1a1a1a">Block N+1</text>
  
  <!-- Block N+1 Content -->
  <g>
    <!-- Batch decryption flash -->
    <g>
      <rect x="590" y="115" width="80" height="30" rx="4" fill="#f0fdf9" stroke="#28a745" stroke-width="1.5"/>
      <text x="630" y="128" class="small text" text-anchor="middle" fill="#28a745" font-weight="600">Batch</text>
      <text x="630" y="138" class="small text" text-anchor="middle" fill="#28a745">Decryption</text>
      
      <!-- Flash effect -->
      <circle cx="630" cy="130" r="25" fill="#28a745" opacity="0">
        <animate attributeName="r" values="25;50;25" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Decrypted packets flowing -->
    <g>
      <rect x="605" y="165" width="50" height="12" rx="2" class="packet-decrypted" opacity="0">
        <animate attributeName="y" values="155;175" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <text x="630" y="183" fill="white" font-size="7" text-anchor="middle">decrypted</text>
      
      <rect x="607" y="180" width="50" height="12" rx="2" class="packet-decrypted" opacity="0">
        <animate attributeName="y" values="170;190" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Arrow to callbacks -->
    <path d="M680 130 L720 130" class="arrow" marker-end="url(#arrowhead)"/>
    
    <!-- onDecrypt callbacks -->
    <g>
      <rect x="730" y="115" width="70" height="22" rx="3" fill="#e3f2fd" stroke="#457b9d" stroke-width="1.5">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
      </rect>
      <text x="765" y="130" class="small text" text-anchor="middle" fill="#1565c0">onDecrypt()</text>
      
      <rect x="730" y="145" width="70" height="22" rx="3" fill="#e3f2fd" stroke="#457b9d" stroke-width="1.5">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" begin="0.3s" repeatCount="indefinite"/>
      </rect>
      <text x="765" y="160" class="small text" text-anchor="middle" fill="#1565c0">onDecrypt()</text>
      
      <rect x="730" y="175" width="70" height="22" rx="3" fill="#e3f2fd" stroke="#457b9d" stroke-width="1.5">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" begin="0.6s" repeatCount="indefinite"/>
      </rect>
      <text x="765" y="190" class="small text" text-anchor="middle" fill="#1565c0">onDecrypt()</text>
      
      <!-- Arrows from callbacks -->
      <path d="M800 126 L840 100" stroke="#457b9d" stroke-width="1.5" marker-end="url(#arrowhead-callback)" opacity="0.7">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M800 156 L840 156" stroke="#457b9d" stroke-width="1.5" marker-end="url(#arrowhead-callback)" opacity="0.7">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" begin="0.3s" repeatCount="indefinite"/>
      </path>
      <path d="M800 186 L840 210" stroke="#457b9d" stroke-width="1.5" marker-end="url(#arrowhead-callback)" opacity="0.7">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" begin="0.6s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Contract recipients -->
    <rect x="845" y="85" width="55" height="22" rx="3" fill="#fff" stroke="#6c757d" stroke-width="1"/>
    <text x="872" y="100" class="small text" text-anchor="middle">Supplicant 1</text>
    
    <rect x="845" y="145" width="55" height="22" rx="3" fill="#fff" stroke="#6c757d" stroke-width="1"/>
    <text x="872" y="160" class="small text" text-anchor="middle">Supplicant 2</text>
    
    <rect x="845" y="205" width="55" height="22" rx="3" fill="#fff" stroke="#6c757d" stroke-width="1"/>
    <text x="872" y="220" class="small text" text-anchor="middle">Supplicant 3</text>
  </g>
  
  <!-- Connection between blocks -->
  <g>
    <path d="M330 180 L570 180" class="arrow-time"/>
    
    <!-- Time label -->
    <rect x="430" y="165" width="40" height="22" rx="11" fill="#fff3e0" stroke="#fd7e14" stroke-width="1.5"/>
    <text x="450" y="180" class="label text" text-anchor="middle" fill="#e65100">~2s</text>
    
    <!-- Animated time arrow -->
    <circle cx="380" cy="180" r="4" fill="#fd7e14">
      <animate attributeName="cx" values="330;570" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Bottom comparison: Chainlink VRF vs CTX -->
  <g transform="translate(0, 315)">
    <text x="50" y="20" class="label text" fill="#6c757d" font-size="10">vs Chainlink VRF: Multi-block (3+ confirmations) → SKALE CTX: Two-block (N→N+1)</text>
  </g>
  
  <!-- Pattern label -->
  <text x="450" y="340" class="title text" text-anchor="middle" fill="#1a1a1a">Two-Block CTX Pattern</text>
</svg>
